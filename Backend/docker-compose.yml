services:
  postgres:
    image: postgres:16-alpine
    container_name: smart_switch_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_switch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smart_switch_mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  api:
    build: .
    container_name: smart_switch_api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/smart_switch
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      AUTH_USERNAME: admin
      AUTH_PASSWORD: admin
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started

  mqtt-consumer:
    build: .
    container_name: smart_switch_mqtt_consumer
    command: ["python", "-m", "app.mqtt.consumer"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/smart_switch
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
