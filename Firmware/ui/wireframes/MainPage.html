<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SmartLight — Superfície de Luz</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    --ink-dark: #2A1C08;       /* text over bright amber */
    --ink-light: #FFF6E6;      /* text over dark / blue */
    --off-bg-top: #19150F;
    --off-bg-bot: #0E0B07;
  }
  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; height:100%; }
  body{
    font-family: var(--sans);
    background:
      radial-gradient(120% 90% at 50% -10%, #221d15 0%, #100d09 55%, #0a0806 100%);
    min-height:100%;
    display:flex; align-items:center; justify-content:center;
    padding: 22px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── device ───────────────────────────────────────────── */
  .phone{
    position:relative;
    height: min(94vh, 884px);
    aspect-ratio: 9 / 19.4;
    border-radius: 46px;
    overflow:hidden;
    background: var(--off-bg-bot);
    box-shadow:
      0 0 0 9px #0c0a07,
      0 0 0 10px rgba(255,255,255,.05),
      0 40px 90px -20px rgba(0,0,0,.8),
      0 8px 30px rgba(0,0,0,.5);
    touch-action: none;
    user-select:none;
    cursor: grab;
  }
  .phone:active{ cursor: grabbing; }

  /* dark "off" background sits under everything */
  .off-bg{
    position:absolute; inset:0;
    background: linear-gradient(180deg, var(--off-bg-top), var(--off-bg-bot));
  }

  /* ── stacked fill layers ──────────────────────────────── */
  /* Each layer is a full-height gradient (bright at top = fully on),
     revealed from the bottom up to its level via clip-path. */
  .layer{ position:absolute; left:0; right:0; bottom:0; overflow:hidden; }
  .layer .paint{ position:absolute; left:0; right:0; bottom:0; }  /* height = full phone, set in JS */

  .layer.drive{ z-index:1; transition: height .5s cubic-bezier(.22,.61,.36,1); }
  .layer.drive .paint{
    background: linear-gradient(180deg,
      #CFE6FF 0%, #93BEF0 20%, #5C92DC 42%, #3C6CB6 64%, #244F89 82%, #15335C 100%);
  }
  .layer.light{ z-index:2; }
  .layer.light .paint{
    background: linear-gradient(180deg,
      #FFE9B8 0%, #FFD27E 16%, #F7B24B 36%, #E68F2C 56%, #C06E1C 76%, #7E4A12 100%);
  }
  /* glow that strengthens with the light level — the "fixture" */
  .glow{
    position:absolute; left:0; right:0; top:0; height:46%;
    background: radial-gradient(80% 100% at 50% 0%, rgba(255,238,196,.9) 0%, rgba(255,210,130,.0) 70%);
    z-index:3; pointer-events:none; opacity:0;
    transition: opacity .25s ease;
  }

  /* ── level markers ────────────────────────────────────── */
  .marker{
    position:absolute; left:0; right:0;
    display:flex; align-items:center; gap:0;
    transform: translateY(50%);
    pointer-events:none;
  }
  .marker .rule{ flex:1; height:0; }
  .marker.light{ z-index:6; }
  .marker.drive{ z-index:4; }
  .marker.light .rule{ border-top: 2px solid rgba(255,255,255,.85); }
  .marker.drive .rule{ border-top: 1.5px dashed rgba(255,255,255,.7); }
  .tag{
    font-size:10px; font-weight:700; letter-spacing:.10em; text-transform:uppercase;
    padding:4px 9px; border-radius:20px; white-space:nowrap;
    display:flex; align-items:center; gap:6px;
  }
  .marker.light .tag{
    background: rgba(255,255,255,.9); color:#92591A;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
  }
  .marker.drive .tag{
    background: rgba(18,40,70,.62); color:#CFE3FF; backdrop-filter: blur(6px);
    border:1px solid rgba(160,200,255,.3);
  }
  .marker.light .grip{
    width:44px; height:6px; border-radius:6px; margin-left:8px; margin-right:14px;
    background: rgba(255,255,255,.92); box-shadow: 0 2px 8px rgba(0,0,0,.22);
  }

  /* ── centered set value ───────────────────────────────── */
  .readout{
    position:absolute; left:0; right:0; top:50%; transform: translateY(-50%);
    z-index:8; text-align:center; pointer-events:none;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    transition: color .2s ease;
  }
  .readout .kicker{
    font-size:11px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
    opacity:.62; margin-bottom:8px;
  }
  .readout .big{
    font-size: 92px; font-weight:800; line-height:.9; letter-spacing:-.04em;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 2px 26px rgba(0,0,0,.16);
  }
  .readout .big .pct{ font-size:34px; font-weight:700; vertical-align: super; margin-left:4px; opacity:.7; }
  .readout .lux{
    font-size:15px; font-weight:600; letter-spacing:.01em; margin-top:10px;
    font-variant-numeric: tabular-nums; opacity:.78;
  }

  /* ── top chrome (always above fills) ──────────────────── */
  .topbar{
    position:absolute; top:0; left:0; right:0; z-index:20;
    display:grid; grid-template-columns: 1fr auto 1fr; align-items:center;
    gap:10px; padding: 22px 18px 0;
  }
  .chip{
    display:inline-flex; align-items:center; gap:7px;
    height:36px; padding:0 13px; border-radius:20px;
    background: rgba(14,11,7,.32); backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,.16);
    color: var(--ink-light); font-weight:700; font-size:12.5px;
    box-shadow: 0 2px 10px rgba(0,0,0,.18);
  }
  .chip.icon{ width:36px; padding:0; justify-content:center; cursor:pointer; }
  .chip.icon:active{ transform: scale(.94); }
  .clock{
    justify-self:center;
    font-variant-numeric: tabular-nums; letter-spacing:.02em;
    font-size:15px; font-weight:800;
  }
  .clock .secs{ font-size:11px; font-weight:700; opacity:.6; margin-left:3px; }
  .live-dot{ width:8px; height:8px; border-radius:50%; background:#5BD08C;
    box-shadow:0 0 0 3px rgba(91,208,140,.22); }
  .left{ justify-self:start; }
  .right{ justify-self:end; }
  .bars{ display:inline-flex; align-items:flex-end; gap:2px; height:13px; }
  .bars i{ width:3px; border-radius:1.5px; background: currentColor; display:block; }

  .hint{
    position:absolute; left:0; right:0; bottom:0; z-index:20;
    padding: 0 0 26px; text-align:center;
    color: var(--ink-light); opacity:.5;
    font-size:12px; font-weight:600; letter-spacing:.04em;
    display:flex; flex-direction:column; align-items:center; gap:8px;
    pointer-events:none;
  }
  .hint .arrows{ font-size:16px; line-height:1; opacity:.8; letter-spacing:0; }
</style>
</head>
<body>
  <div class="phone" id="phone" role="slider" aria-label="Intensidade de luz" aria-valuemin="0" aria-valuemax="100" tabindex="0">
    <div class="off-bg"></div>
    <div class="layer drive" id="driveLayer"><div class="paint" id="drivePaint"></div></div>
    <div class="layer light" id="lightLayer"><div class="paint" id="lightPaint"></div></div>
    <div class="glow" id="glow"></div>

    <!-- top chrome -->
    <div class="topbar">
      <div class="left">
        <span class="chip" title="Conectado">
          <span class="live-dot"></span>
          <span class="bars"><i style="height:5px"></i><i style="height:8px"></i><i style="height:11px"></i><i style="height:13px"></i></span>
        </span>
      </div>
      <div class="clock chip" style="background:rgba(14,11,7,.30)">
        <span id="clockTime">--:--</span><span class="secs" id="clockSecs"></span>
      </div>
      <div class="right">
        <span class="chip icon" title="Configurações" id="cfgBtn">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="5" y1="8" x2="19" y2="8"></line><circle cx="9" cy="8" r="2.4" fill="rgba(14,11,7,.5)"></circle>
            <line x1="5" y1="16" x2="19" y2="16"></line><circle cx="15" cy="16" r="2.4" fill="rgba(14,11,7,.5)"></circle>
          </svg>
        </span>
      </div>
    </div>

    <!-- actuation (blue) marker, behind -->
    <div class="marker drive" id="driveMarker">
      <div class="rule"></div>
      <div class="tag" style="margin:0 14px">Acionamento <span id="driveVal">0</span>%</div>
    </div>

    <!-- light (amber) marker + handle, front -->
    <div class="marker light" id="lightMarker">
      <div class="rule"></div>
      <div class="tag" style="margin-left:14px">Luz</div>
      <div class="grip"></div>
    </div>

    <!-- centered set value -->
    <div class="readout" id="readout">
      <div class="kicker">Luz definida</div>
      <div class="big"><span id="bigVal">0</span><span class="pct">%</span></div>
      <div class="lux">≈ <span id="luxVal">0</span> lux</div>
    </div>

    <div class="hint">
      <span class="arrows">▲ &nbsp; ▼</span>
      arraste para ajustar a intensidade
    </div>
  </div>

<script>
(function(){
  var phone   = document.getElementById('phone');
  var lightL  = document.getElementById('lightLayer');
  var driveL  = document.getElementById('driveLayer');
  var lightP  = document.getElementById('lightPaint');
  var driveP  = document.getElementById('drivePaint');
  var glow    = document.getElementById('glow');
  var lightM  = document.getElementById('lightMarker');
  var driveM  = document.getElementById('driveMarker');
  var readout = document.getElementById('readout');
  var bigVal  = document.getElementById('bigVal');
  var luxVal  = document.getElementById('luxVal');
  var driveVal= document.getElementById('driveVal');

  var LS_KEY = 'smartlight.surface.level';
  var stored = parseFloat(localStorage.getItem(LS_KEY));
  var level  = isFinite(stored) ? clamp(stored) : 62;   // injected light intensity %

  function clamp(v){ return Math.max(0, Math.min(100, v)); }

  // keep the gradient anchored to the full phone height so the top stays "fully on"
  function sizePaint(){ var h = phone.clientHeight; lightP.style.height = h + 'px'; driveP.style.height = h + 'px'; }
  window.addEventListener('resize', sizePaint);

  // actuation (blue) follows the demand with a little overhead, saturating near full
  function driveFor(l){ return clamp(Math.round(l * 1.14 + 6)); }

  function render(animateDrive){
    var l = level;
    var d = driveFor(l);

    // reveal the fixed full-height gradient from the bottom up to the level
    lightL.style.height = l + '%';
    if(!animateDrive){ driveL.style.transition = 'none'; }
    driveL.style.height = d + '%';
    if(!animateDrive){ void driveL.offsetWidth; driveL.style.transition = ''; }

    glow.style.opacity = (l/100 * 0.9).toFixed(3);

    // markers positioned from the bottom
    lightM.style.bottom = l + '%';
    driveM.style.bottom = d + '%';
    // keep the blue tag from colliding with the very top/bottom edges
    driveM.style.display = (Math.abs(d - l) < 5 || d >= 99) ? 'none' : 'flex';

    // values
    bigVal.textContent  = Math.round(l);
    luxVal.textContent  = Math.round(l * 4.6);
    driveVal.textContent= d;

    // readout contrast: dark text once the bright amber covers the centre (≥50%)
    readout.style.color = l >= 50 ? 'var(--ink-dark)' : 'var(--ink-light)';

    phone.setAttribute('aria-valuenow', Math.round(l));
    localStorage.setItem(LS_KEY, String(l));
  }

  // ── drag / tap ─────────────────────────────────────────
  var dragging = false;
  function levelFromEvent(e){
    var r = phone.getBoundingClientRect();
    var y = e.clientY - r.top;
    return clamp((1 - y / r.height) * 100);
  }
  phone.addEventListener('pointerdown', function(e){
    if(e.target.closest('#cfgBtn')) return;        // let the config button be tappable
    dragging = true;
    phone.setPointerCapture(e.pointerId);
    level = levelFromEvent(e);
    render(true);
  });
  phone.addEventListener('pointermove', function(e){
    if(!dragging) return;
    level = levelFromEvent(e);
    render(true);
  });
  function endDrag(e){ if(dragging){ dragging = false; try{ phone.releasePointerCapture(e.pointerId); }catch(_){} } }
  phone.addEventListener('pointerup', endDrag);
  phone.addEventListener('pointercancel', endDrag);

  // keyboard
  phone.addEventListener('keydown', function(e){
    var step = e.shiftKey ? 10 : 2;
    if(e.key === 'ArrowUp' || e.key === 'ArrowRight'){ level = clamp(level + step); render(true); e.preventDefault(); }
    else if(e.key === 'ArrowDown' || e.key === 'ArrowLeft'){ level = clamp(level - step); render(true); e.preventDefault(); }
  });

  // config button (placeholder action)
  document.getElementById('cfgBtn').addEventListener('click', function(e){ e.stopPropagation(); });

  // ── clock ──────────────────────────────────────────────
  function pad(n){ return n < 10 ? '0' + n : '' + n; }
  function tick(){
    var t = new Date();
    document.getElementById('clockTime').textContent = pad(t.getHours()) + ':' + pad(t.getMinutes());
    document.getElementById('clockSecs').textContent = pad(t.getSeconds());
  }
  tick(); setInterval(tick, 1000);

  sizePaint();
  render(false);
})();
</script>
</body>
</html>
