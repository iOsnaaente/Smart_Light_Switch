name: Docker Build and Push

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'Backend/**'
      - main


jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t iosnaaente/smart-switch-backend:latest \
            -t iosnaaente/smart-switch-backend:${{ github.sha }} \
            ./Backend

      - name: Push Latest
        run: |
          docker push iosnaaente/smart-switch-backend:latest

      - name: Push Commit Tag
        run: |
          docker push iosnaaente/smart-switch-backend:${{ github.sha }}